services:
  - type: web
    name: tibbar-book-store-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: COOKIE_SAME_SITE
        value: none
      - key: COOKIE_SECURE
        value: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: VNP_RETURN_URL
        sync: false
      - key: VNP_TMN_CODE
        sync: false
      - key: VNP_HASH_SECRET
        sync: false
